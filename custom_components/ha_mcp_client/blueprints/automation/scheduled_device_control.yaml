blueprint:
  name: "AI 排程裝置控制"
  description: >
    在指定時間發送控制指令通知到側邊欄通知面板。
    適合排程提醒需要執行的裝置操作。
  domain: automation
  input:
    schedule_time:
      name: "執行時間"
      default: "22:00:00"
      selector:
        time:
    notification_title:
      name: "通知標題"
      default: "🎛️ 排程裝置控制"
      selector:
        text:
    control_prompt:
      name: "控制指令"
      description: "用自然語言描述要執行的操作"
      default: "關閉所有燈光，除了臥室的夜燈"
      selector:
        text:
          multiline: true

trigger:
  - platform: time
    at: !input schedule_time

action:
  - service: notify.persistent_notification
    data:
      title: !input notification_title
      message: !input control_prompt
