blueprint:
  name: "AI 定期裝置檢查"
  description: >
    定期讓 AI 助手檢查指定裝置的狀態。適合監控重要感測器，
    如伺服器室溫度、水管漏水偵測等。
  domain: automation
  input:
    check_interval:
      name: "檢查間隔 (分鐘)"
      description: "多久檢查一次"
      default: 30
      selector:
        number:
          min: 5
          max: 1440
          unit_of_measurement: "分鐘"
    check_prompt:
      name: "檢查指令"
      description: "給 AI 的檢查指令，包含要監控的裝置"
      default: "檢查 sensor.living_room_temperature，如果溫度超過 30 度請通知我"
      selector:
        text:
          multiline: true
    conversation_entity:
      name: "AI 對話實體"
      selector:
        entity:
          filter:
            domain: conversation

trigger:
  - platform: time_pattern
    minutes: !input check_interval

action:
  - service: conversation.process
    data:
      text: !input check_prompt
      agent_id: !input conversation_entity
