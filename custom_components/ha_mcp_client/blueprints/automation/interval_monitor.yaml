blueprint:
  name: "AI 間隔監控與警報"
  description: >
    每隔指定時間發送監控提醒通知到側邊欄通知面板。
    適合定期檢查溫度、能源用量等感測器狀態。
  domain: automation
  input:
    monitor_interval:
      name: "監控間隔 (分鐘)"
      default: 15
      selector:
        number:
          min: 1
          max: 1440
          unit_of_measurement: "分鐘"
    notification_title:
      name: "通知標題"
      default: "📊 間隔監控提醒"
      selector:
        text:
    monitor_prompt:
      name: "監控指令"
      description: "通知的監控內容"
      default: >
        檢查以下感測器：
        1. sensor.living_room_temperature — 如果超過 28°C 通知我
        2. sensor.humidity — 如果低於 30% 通知我
        如果所有數值正常，不需要通知。
      selector:
        text:
          multiline: true

trigger:
  - platform: time_pattern
    minutes: !input monitor_interval

action:
  - service: notify.persistent_notification
    data:
      title: !input notification_title
      message: !input monitor_prompt
