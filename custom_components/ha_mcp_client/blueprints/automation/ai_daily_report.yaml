blueprint:
  name: "AI 每日智慧家居報告"
  description: >
    每天在指定時間發送通知到側邊欄通知面板。
    可自訂通知標題和內容，適合每日狀態提醒。
  domain: automation
  input:
    report_time:
      name: "報告時間"
      description: "每天發送通知的時間"
      default: "08:00:00"
      selector:
        time:
    notification_title:
      name: "通知標題"
      default: "🏠 每日智慧家居報告"
      selector:
        text:
    report_message:
      name: "通知訊息"
      description: "通知的內容"
      default: >
        請檢查所有感測器狀態，包含溫度、濕度、門窗狀態等，
        並產生一份簡潔的智慧家居狀態摘要。如有異常請特別標註。
      selector:
        text:
          multiline: true

trigger:
  - platform: time
    at: !input report_time

action:
  - service: notify.persistent_notification
    data:
      title: !input notification_title
      message: !input report_message
